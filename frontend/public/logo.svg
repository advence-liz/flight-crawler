<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 蜘蛛腿（左侧 3 条） -->
  <g stroke="#555" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="30" y1="58" x2="10" y2="48"/>
    <line x1="30" y1="62" x2="8"  y2="62"/>
    <line x1="30" y1="66" x2="10" y2="76"/>
    <!-- 右侧 3 条 -->
    <line x1="70" y1="58" x2="90" y2="48"/>
    <line x1="70" y1="62" x2="92" y2="62"/>
    <line x1="70" y1="66" x2="90" y2="76"/>
  </g>

  <!-- 蜘蛛身体（腹部） -->
  <ellipse cx="50" cy="75" rx="12" ry="14" fill="#4a4a6a" stroke="#333" stroke-width="1.5"/>
  <!-- 腹部花纹 -->
  <ellipse cx="50" cy="75" rx="6" ry="8" fill="#6a5acd" opacity="0.6"/>

  <!-- 猫头（圆脸） -->
  <circle cx="50" cy="50" r="22" fill="#f5c07a" stroke="#d4956a" stroke-width="1.5"/>

  <!-- 猫耳朵 -->
  <polygon points="32,32 28,14 42,28" fill="#f5c07a" stroke="#d4956a" stroke-width="1.5"/>
  <polygon points="68,32 72,14 58,28" fill="#f5c07a" stroke="#d4956a" stroke-width="1.5"/>
  <!-- 耳朵内粉色 -->
  <polygon points="33,30 30,18 41,28" fill="#f0a0a0"/>
  <polygon points="67,30 70,18 59,28" fill="#f0a0a0"/>

  <!-- 猫眼睛 -->
  <ellipse cx="41" cy="50" rx="6" ry="7" fill="white"/>
  <ellipse cx="59" cy="50" rx="6" ry="7" fill="white"/>
  <!-- 瞳孔（竖瞳） -->
  <ellipse cx="41" cy="50" rx="2.5" ry="5" fill="#1a1a2e"/>
  <ellipse cx="59" cy="50" rx="2.5" ry="5" fill="#1a1a2e"/>
  <!-- 眼睛高光 -->
  <circle cx="42.5" cy="47.5" r="1.2" fill="white"/>
  <circle cx="60.5" cy="47.5" r="1.2" fill="white"/>

  <!-- 猫鼻子 -->
  <polygon points="50,56 47.5,59 52.5,59" fill="#e88080"/>
  <!-- 猫嘴 -->
  <path d="M47.5,59 Q50,62 52.5,59" stroke="#c06060" stroke-width="1.2" fill="none"/>
  <!-- 胡须左 -->
  <line x1="30" y1="57" x2="44" y2="58" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="60" x2="44" y2="60" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <!-- 胡须右 -->
  <line x1="70" y1="57" x2="56" y2="58" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="70" y1="60" x2="56" y2="60" stroke="#888" stroke-width="1" stroke-linecap="round"/>
</svg>
