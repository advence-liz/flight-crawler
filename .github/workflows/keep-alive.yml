name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分钟触发，对冲 GitHub Actions 调度延迟（实际间隔约 10-15 分钟）

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/api/health")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
