name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟 ping 一次，防止 Render 休眠（阈值 15 分钟）

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/api/health")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
