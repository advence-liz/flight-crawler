services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flight-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - ./backend/data:/app/data    # SQLite 数据持久化（首次使用镜像内初始 db）
      - flight_logs:/app/logs       # 日志持久化
    networks:
      - flight-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flight-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flight-net

volumes:
  flight_logs:

networks:
  flight-net:
    driver: bridge
